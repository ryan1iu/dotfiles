[colors]
background = #90000000
background-alt = #5B7396
foreground = #D8DEE9
primary = #d3e0f3
secondary = #8ABEB7
alert = #A54242
disabled = #707880
line = #a1afc9
blue = #00A7F7
cyan = #8be9fd
green = #36D827
orange = #ffb86c
pink = #B48EAD
purple = #712CC5
red = #DC4965
yellow = #FFC229
deepgreen = #00C20A
green2 = #3BBB37

[bar/mybar]
width = 100%
height = 25pt
bottom = false
background = ${colors.background}
foreground = ${colors.foreground}
border-right-size = 15
border-color = #90000000
tray-transparent = false
tray-padding = 1
module-margin = 1
separator = %{T3}⏽%{T-}
separator-foreground = ${colors.primary}
;tray-position = right
;line-size = 3pt
;border-left-size = 15
;border-bottom-size = 5
;tray-offset-x = 8
;padding-left = 0
;padding-right = 1
;override-redirect = true
modules-left =session xworkspaces speed 
modules-right = spotify backlight pulseaudio memory cpu battery date systray
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true
wm-restack = i3

font-0 = Droid SansMono Nerd Font:size=15:weight=Bold;3
font-1 = Droid SansMono Nerd Font:size=12:weight=Bold;3
font-2 = Droid SansMono Nerd Font:size=10:weight=Bold;3
font-3 = Droid SansMono Nerd Font:size=8:weight=Bold;3
font-4 = AaBoruokaishuBldjf:size=13:weight=Bold;2

[module/speed]
type = internal/network
interface = wlp4s0 
interval = 1.0
label-connected =  %{T2}%downspeed%%{T-}   
label-disconnected = %{T1} %{T-}

[module/network]
type = custom/script
exec = /etc/polybar/ipfinder.sh
tail = true

[module/spotify]
type = custom/script
interval = 1
format-prefix = %{T1} %{T-}
format-prefix-foreground = ${colors.green2}
format-font = 2
format = <label>
exec = python /home/ryan/.config/polybar/spotify.py -f '{artist}: {song}' -t 20 
;control players (optional)
click-left = playerctl --player=spotify play-pause 
click-right = playerctl --player=spotify next 
click-middle = playerctl --player=spotify previous 

[module/battery]
type=internal/battery
full-at=95
battery=${system.battery}
adapter=${system.adapter}
poll-interval=30
time-format=%H:%M

format-charging=<animation-charging><label-charging>
format-discharging=<ramp-capacity><label-discharging>
;format-discharging=<ramp-capacity>
format-full-prefix=" "
format-full-prefix-font=2
format-full-prefix-foreground= #7AE372
format-full-prefix-background=${color.background}

label-charging=%{T2}󱐋%{T-}
label-discharging=%{T2} %percentage%%{T-}
label-full=%{T2}%{T-}

label-charging-foreground=#7AE372
label-discharging-foreground= #D1F4CF
label-full-foreground=#7AE372

ramp-capacity-0=" "
ramp-capacity-1=" "
ramp-capacity-2=" "
ramp-capacity-3=" "
ramp-capacity-4=" "
ramp-capacity-foreground=#7AE372
ramp-capacity-background=${color.background}

animation-charging-0=" "
animation-charging-1=" "
animation-charging-2=" "
animation-charging-3=" "
animation-charging-4=" "
animation-charging-foreground=#7AE372
animation-charging-framerate=750

[module/xworkspaces]
type = internal/xworkspaces

label-active = %{T2}%name%%{T-}
label-active-foreground = #51B254
label-active-padding = 1

label-occupied = %{T2}%name%%{T-}
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %{T2}%name%%{T-}
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25
mount-0 = /
label-mounted = %{F#d3e0f3}%mountpoint%%{F-} %percentage_used%%
;format-mounted-underline = ${colors.line}
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = %{T1}墳 %{T-}
format-volume-prefix-foreground = ${colors.blue}
format-volume = <label-volume>
label-volume = %{T2}%percentage%%%{T-}
label-muted = %{T1}󰖁 %{T-}
label-muted-foreground = ${colors.disabled}

[module/i3]
type = internal/i3
index-sort = true
format = <label-state> <label-mode>

label-mode = %{T2}%mode%%{T-}
label-mode-foreground = ${colors.purple}
label-mode-padding = 1

label-focused = %{T10}%{T-}
label-focused-foreground = ${colors.green}
label-focused-padding = 1

label-unfocused = %{T9}%{T-}
label-unfocused-foreground = ${colors.purple}
label-unfocused-padding = 1

label-urgent = %{T9}%{T-}
label-urgent-foreground = ${colors.red}
label-urgent-padding = 1

label-visible = %{T9}%{T-}
label-visible-foreground = ${colors.blue}
label-visible-padding = 1

[module/memory]
type = internal/memory
interval = 2
format-prefix = %{T1} %{T-}
format-prefix-foreground = ${colors.pink}
label = %{T2}%percentage_used:2%%%{T-}

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = %{T1}󰻠 %{T-}
format-prefix-foreground = #6EBEF9
label = %{T2}%percentage:2%%%{T-}

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
;label-connected = %{F#F0C674}%ifname%%{F-} %essid% %local_ip%
label-connected = %local_ip%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/date]
type = internal/date
interval = 1
format-prefix = %{T1}󱑃 %{T-}
format-prefix-foreground = ${colors.primary}
date-alt = %H:%M
date = %m-%d %H:%M
label = %{T2}%date%%{T-}
label-foreground = ${colors.primary}

[module/session]
type = custom/text
click-left = lxsession-logout -p ""
content = %{T1}%{T-}
content-foreground = #20EE22
content-padding = 1

[module/gap]
type = custom/text
content = ⏽

[module/backlight]
type=internal/xbacklight
; Use the following command to list available cards:
; $ ls -1 /sys/class/backlight/
card=nvidia_0
format=<ramp> <label>
format-background=${color.yellow}
label=%{T2}%percentage%%%{T-}
label-foreground=${color.primary}
ramp-0=
ramp-1=
ramp-2=
ramp-3=
ramp-4=
ramp-5=
ramp-6=
ramp-7=
ramp-8=
ramp-9=
ramp-font=2
ramp-foreground=${colors.yellow}

[module/xkeyboard]
type=internal/xkeyboard
format="<label-indicator> "
format-font=4
format-foreground=${color.blue}
label-indicator-on-capslock=""
label-indicator-off-capslock=
label-indicator-on-numlock=
label-indicator-off-numlock=" " 

[module/systray]
type=custom/ipc
hook-0=echo " "
hook-1=echo " "
click-left=systray
initial=2
format-font=2
format-foreground=${color.blue}

[settings]
screenchange-reload = true
pseudo-transparency = false
; vim:ft=dosini
