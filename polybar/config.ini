[colors]
background = #2A2B38
background-alt = #5B7396
foreground = #D8DEE9
primary = #d3e0f3
secondary = #8ABEB7
alert = #A54242
disabled = #707880
line = #a1afc9
blue = #6272a4
cyan = #8be9fd
green = #A3BE8C
orange = #ffb86c
pink = #B48EAD
purple = #bd93f9
red = #ff5555
yellow = #D08770

[bar/example]
width = 100%
height = 25pt
;radius = 3
bottom = true
; dpi = 96
background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt
tray-position = right
border-left-size = 13
border-right-size = 21
border-bottom-size = 8
border-color = #00000000
tray-transparent = true
tray-padding = 1
tray-offset-x = 8
padding-left = 0
padding-right = 1
module-margin = 1
separator = |


separator-foreground = ${colors.disabled}

font-0 = Droid SansMono Nerd Font:size=12:weight=Bold;3
font-1 = WenQuanYi Zen Hei:weight=Bold;2
modules-left = xworkspaces network speed
modules-right = spotify pulseaudio memory cpu date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; tray-position = right

; wm-restack = generic
; wm-restack = bspwm
wm-restack = i3

; override-redirect = true
[module/speed]
type = internal/network
interface = wlp4s0
interval = 1.0
label-connected =  %downspeed%   
label-disconnected = disconnected

[module/network]
type = custom/script
exec = /etc/polybar/ipfinder.sh
tail = true

[module/spotify]
type = custom/script
interval = 1
format-prefix = "ůįęĒ  "
format-font = 2
format = <label>
exec = python /etc/polybar/spotify.py -f '{artist}: {song}' -t 20
;format-underline = #1db954
;control players (optional)
click-left = playerctl --player=spotify play-pause 
click-right = playerctl --player=spotify next 
click-middle = playerctl --player=spotify previous 

[module/battery]
type = internal/battery

; This is useful in case the battery never reports 100% charge
; Default: 100
full-at = 99

; format-low once this charge percentage is reached
; Default: 10
; New in version 3.6.0
low-at = 5

; Use the following command to list batteries and adapters:
; $ ls -1 /sys/class/power_supply/
battery = BAT0
adapter = ADP1

; If an inotify event haven't been reported in this many
; seconds, manually poll for new values.
;
; Needed as a fallback for systems that don't report events
; on sysfs/procfs.
;
; Disable polling by setting the interval to 0.
;
; Default: 5
poll-interval = 5

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /
label-mounted = %{F#d3e0f3}%mountpoint%%{F-} %percentage_used%%
;format-mounted-underline = ${colors.line}
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-underline = ${colors.orange}
format-volume-prefix = "Ô©Ĺ "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = "ůįĖĀ "
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-underline = ${colors.pink}
format-prefix = "Ô°ö "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "ůįĽ† "
format-underline = ${colors.green}
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
;label-connected = %{F#F0C674}%ifname%%{F-} %essid% %local_ip%
label-connected = %local_ip%
[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/date]
type = internal/date
interval = 1
format-prefix = "ůĪĎÉ "
date-alt = %H:%M
date = %m-%d %H:%M
format-underline = ${colors.purple}
label = %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
